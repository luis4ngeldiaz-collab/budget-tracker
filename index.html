<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Budget Pro V10.0</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header><h1>Budget Pro V10.0</h1></header>

<div id="screens">
  <div id="dashboard" class="screen active">
    <div class="card mini-card">
      <small>Total Net Worth</small>
      <h2 id="net-worth">$0</h2>
      <div class="status-row">
        <small>Cash: <span id="balance">$0</span></small>
        <small>Invested: <span id="invested-val" style="color:#0072ff;">$0</span></small>
      </div>
    </div>
    
    <div id="active-goals-scroll" class="horizontal-scroll">
      </div>

    <div class="card">
      <h3>Safe to Spend: <span id="safe-spend" style="color:#4CAF50;">$0</span></h3>
      <div id="category-bars"></div>
    </div>
  </div>

  <div id="investing" class="screen">
    <div class="card">
      <h3>New Visual Goal</h3>
      <input id="goal-name" placeholder="What are we saving for?">
      <input id="goal-amount" type="number" placeholder="Target Amount ($)">
      <input id="goal-image" placeholder="Image Link (Paste from Google/Pinterest)">
      <button id="add-goal-btn">Plant This Goal</button>
    </div>
    <div id="goal-list"></div>
  </div>

  <div id="transactions" class="screen">
    <div class="card">
      <h3>Log Activity</h3>
      <input id="desc" placeholder="Merchant/Source" list="merchant-list">
      <datalist id="merchant-list"></datalist>
      <input id="amount" type="number" placeholder="Amount ($)">
      <div class="split-row">
        <select id="type-select">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
          <option value="invest">Investment (Grow)</option>
        </select>
        <select id="category-select"></select>
      </div>
      <select id="goal-select" style="display:none; border-color:#0072ff;"></select>
      <button id="add-transaction-btn">Confirm Log</button>
    </div>
    <div class="card">
       <ul id="transaction-list"></ul>
    </div>
  </div>
</div>

<nav>
  <button onclick="switchTab('dashboard')">Dash</button>
  <button onclick="switchTab('investing')">Invest</button>
  <button onclick="switchTab('transactions')">Logs</button>
</nav>

<script src="script.js"></script>
</body>
</html>
