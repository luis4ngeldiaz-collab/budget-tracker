<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Budget Pro V8.0</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header><h1>Budget Pro V8.0</h1></header>

<div id="screens">
  <div id="dashboard" class="screen active">
    <div class="card mini-card">
      <small>Safe to Spend</small>
      <h2 id="safe-spend">$0</h2>
      <div class="status-row">
        <small>Bank: <span id="balance">$0</span></small>
        <small>Growth: <span id="invested-val">$0</span></small>
      </div>
    </div>
    <div class="card">
      <h3>Budget Health</h3>
      <div id="category-bars"></div>
    </div>
  </div>

  <div id="setup" class="screen">
    <div class="card">
      <h3>Manage Categories</h3>
      <div class="split-row">
        <input id="new-cat-name" placeholder="New Category (e.g. Gas)">
        <button onclick="addCategory()" style="width:80px;">Add</button>
      </div>
      <div id="custom-cat-list" class="tag-container"></div>
    </div>
    <div class="card">
      <h3>Monthly Caps</h3>
      <div id="cap-inputs"></div>
      <button onclick="saveCaps()">Save All Limits</button>
    </div>
  </div>

  <div id="transactions" class="screen">
    <div class="card">
      <h3>Add Transaction</h3>
      <input id="desc" placeholder="Description">
      <input id="amount" type="number" placeholder="Amount ($)">
      <div class="split-row">
        <select id="type-select">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
          <option value="invest">Investment</option>
        </select>
        <select id="category-select"></select>
      </div>
      <label style="font-size:10px; color:#666;"><input type="checkbox" id="is-recurring"> Repeat Monthly?</label>
      <button id="add-transaction-btn">Confirm Log</button>
    </div>
    <div class="card">
       <input placeholder="Search..." id="search-transactions">
       <ul id="transaction-list"></ul>
    </div>
  </div>
</div>

<nav>
  <button onclick="switchTab('dashboard')">Dash</button>
  <button onclick="switchTab('setup')">Custom</button>
  <button onclick="switchTab('transactions')">Logs</button>
</nav>

<script src="script.js"></script>
</body>
</html>
