<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dad's Budget Tracker V6.6</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>💰 Dad's Goal Tracker</h1>
</header>

<div id="screens">
  <div id="dashboard" class="screen active">
    <div class="card main-balance">
      <h2>Total Savings</h2>
      <p id="balance">$0</p>
      <small id="savings-pct">0% of primary goal reached</small>
    </div>
    
    <div class="card">
      <h2>Cash Flow (In vs. Out)</h2>
      <div class="chart-container">
        <div class="chart-column">
          <div id="bar-income" class="bar income-bar" style="height: 0%"></div>
          <span>Job/In</span>
        </div>
        <div class="chart-column">
          <div id="bar-expense" class="bar expense-bar" style="height: 0%"></div>
          <span>Bills/Out</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Daily Savings Target</h2>
      <p id="daily-target">$0</p>
    </div>
    <div id="dashboard-goals"></div>
  </div>

  <div id="goals" class="screen">
    <div class="card">
      <h2>Set a Savings Goal</h2>
      <input id="goal-name" placeholder="e.g., Emergency Fund">
      <input id="goal-amount" type="number" placeholder="Target Amount ($)">
      <select id="goal-priority">
        <option value="High">High Priority</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <button id="add-goal-btn">Set Goal</button>
    </div>
    <div id="goal-list"></div>
  </div>

  <div id="transactions" class="screen">
    <div class="card">
      <h2>Add Money or Bill</h2>
      <input id="desc" placeholder="Description (e.g., Weekly Pay)">
      <input id="amount" type="number" placeholder="Amount ($)">
      <select id="category">
        <option value="income">Job / Income</option>
        <option value="expense">Bill / Expense</option>
      </select>
      <select id="goal-select"></select>
      <input type="date" id="transaction-date">
      <button id="add-transaction-btn">Add Transaction</button>
    </div>
    <div class="card">
       <input placeholder="Search transactions..." id="search-transactions">
       <ul id="transaction-list"></ul>
    </div>
  </div>

  <div id="settings" class="screen">
    <div class="card">
      <h2>App Settings</h2>
      <button onclick="localStorage.clear(); location.reload();" style="background:#f44336; width:100%;">Wipe All Data</button>
    </div>
  </div>
</div>

<nav>
  <button onclick="switchTab('dashboard')">Home</button>
  <button onclick="switchTab('goals')">Goals</button>
  <button onclick="switchTab('transactions')">Add Log</button>
  <button onclick="switchTab('settings')">Settings</button>
</nav>

<script src="script.js"></script>
</body>
</html>
