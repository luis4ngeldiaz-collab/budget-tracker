<div id="add-sheet" class="bottom-sheet">
    <div class="handle" onclick="closeSheet()"></div>
    <div class="sheet-body">
      <h3 class="sheet-title">New Entry</h3>
      
      <div class="type-picker">
        <button id="btn-exp" class="choice active" onclick="setType('expense')">Spent</button>
        <button id="btn-inc" class="choice" onclick="setType('income')">Earned</button>
      </div>

      <div class="input-group">
        <input id="amount" type="number" placeholder="$0.00" class="ios-in amount-large">
        <input id="desc" placeholder="Where? (e.g. Walmart)" class="ios-in">
      </div>

      <div class="label-small">Category</div>
      <div class="quick-tags" id="tag-container">
          </div>

      <div class="label-small">Extra Info (Optional)</div>
      <input id="note" placeholder="Any notes?" class="ios-in-small">
      <input id="entry-date" type="date" class="ios-in-small">

      <button onclick="saveNow()" class="save-btn">Add to My Money</button>
      <div style="height: 30px;"></div>
    </div>
</div>
