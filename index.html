<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Budget Pro V12</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app-container">
  <header>
    <h1 id="header-title">Summary</h1>
  </header>

  <div id="screens">
    <div id="dashboard" class="screen active">
      <div class="ios-card-large">
        <small>NET WORTH</small>
        <h2 id="net-worth">$0.00</h2>
        <div class="ios-stats-grid">
          <div><label>CASH</label><span id="balance">$0</span></div>
          <div><label>GROWTH</label><span id="invested-val" style="color:#0A84FF;">$0</span></div>
        </div>
      </div>
      <div class="section-label">Budget Health</div>
      <div id="category-bars" class="ios-list-container"></div>
    </div>

    <div id="transactions" class="screen">
      <div class="section-label">All Activity</div>
      <div id="transaction-list" class="ios-list-container"></div>
    </div>
  </div>

  <div id="overlay" onclick="toggleSheet()"></div>

  <div id="action-sheet" class="ios-sheet">
    <div class="sheet-handle-container" id="sheet-handle-zone">
      <div class="sheet-handle"></div>
    </div>
    <div class="sheet-content">
      <h3 class="sheet-title">New Entry</h3>
      <input id="desc" placeholder="Merchant" class="ios-input">
      <input id="amount" type="number" placeholder="$0.00" class="ios-input">
      
      <div class="ios-segment-control">
        <button class="seg-btn active" onclick="setType('expense', this)">Expense</button>
        <button class="seg-btn" onclick="setType('income', this)">Income</button>
        <button class="seg-btn" onclick="setType('invest', this)">Invest</button>
      </div>

      <select id="category-select" class="ios-input"></select>
      <button id="add-transaction-btn" class="ios-main-btn">Save</button>
      <div style="height: 60px;"></div>
    </div>
  </div>

  <nav class="ios-tab-bar">
    <button onclick="switchTab('dashboard')"><div class="nav-icon home"></div><span>Summary</span></button>
    <button onclick="toggleSheet()" class="add-tab"><div class="nav-icon plus"></div></button>
    <button onclick="switchTab('transactions')"><div class="nav-icon clock"></div><span>History</span></button>
  </nav>
</div>

<script src="script.js"></script>
</body>
</html>
