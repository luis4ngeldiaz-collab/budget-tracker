<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Budget Pro V7.2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Budget Pro</h1>
</header>

<div id="screens">
  <div id="dashboard" class="screen active">
    <div class="card mini-card">
      <small>Safe to Spend</small>
      <h2 id="safe-spend">$0</h2>
      <div class="status-row">
        <small>Bank: <span id="balance">$0</span></small>
        <small>Invested: <span id="invested-val" style="color:#0072ff;">$0</span></small>
      </div>
    </div>
    
    <div class="card">
      <h3>Budget Caps (Pruning)</h3>
      <div id="category-bars" class="category-stats"></div>
    </div>

    <div class="card">
      <h3>Cash Flow</h3>
      <div class="chart-container">
        <div class="chart-column"><div id="bar-income" class="bar income-bar"></div><span>In</span></div>
        <div class="chart-column"><div id="bar-expense" class="bar expense-bar"></div><span>Out</span></div>
        <div class="chart-column"><div id="bar-invest" class="bar invest-bar"></div><span>Grow</span></div>
      </div>
    </div>
  </div>

  <div id="goals" class="screen">
    <div class="card">
      <h3>Category Needs (Monthly Caps)</h3>
      <p style="font-size:10px; color:#666; margin-bottom:10px;">Set monthly limits for your pruning tool.</p>
      <div id="cap-inputs"></div>
      <button onclick="saveCaps()" style="background:#333; margin-top:10px;">Update Budget Caps</button>
    </div>
    <div class="card">
      <h3>Savings Goals</h3>
      <input id="goal-name" placeholder="Goal Name (e.g. Car)">
      <input id="goal-amount" type="number" placeholder="Target Amount ($)">
      <button id="add-goal-btn">Set Goal</button>
      <div id="goal-list"></div>
    </div>
  </div>

  <div id="transactions" class="screen">
    <div class="card">
      <h3>Log Activity</h3>
      <input id="desc" placeholder="Description">
      <input id="amount" type="number" placeholder="Amount ($)">
      <div class="split-row">
        <select id="type-select">
          <option value="income">Income (Job)</option>
          <option value="expense">Expense (Bill)</option>
          <option value="invest">Investment (Grow)</option>
        </select>
        <select id="category-select">
          <option value="Food">Food</option>
          <option value="Bills">Bills</option>
          <option value="Shopping">Shopping</option>
          <option value="Personal">Personal</option>
        </select>
      </div>
      <select id="goal-select"></select>
      <button id="add-transaction-btn">Add Log</button>
    </div>
    <div class="card">
       <input placeholder="Search transactions..." id="search-transactions">
       <ul id="transaction-list"></ul>
    </div>
  </div>
</div>

<nav>
  <button onclick="switchTab('dashboard')">Dash</button>
  <button onclick="switchTab('goals')">Setup</button>
  <button onclick="switchTab('transactions')">Logs</button>
</nav>

<script src="script.js"></script>
</body>
</html>
