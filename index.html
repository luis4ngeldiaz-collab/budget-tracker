<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal Budget App V6.3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>💰 Goal Tracker V6.3</h1>
</header>

<div id="screens">
  <div id="dashboard" class="screen active">
    <div class="card">
      <h2>Total Balance</h2>
      <p id="balance">$0</p>
    </div>
    <div class="card">
      <h2>Daily / Biweekly Target</h2>
      <p id="daily-target">$0</p>
    </div>
    <div id="dashboard-goals"></div>
  </div>

  <div id="goals" class="screen">
    <div class="card">
      <h2>Create Goal</h2>
      <input id="goal-name" placeholder="Goal name">
      <input id="goal-amount" type="number" placeholder="Target amount">
      <select id="goal-priority">
        <option value="High">High Priority</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <button id="add-goal-btn">Add Goal</button>
    </div>
    <div id="goal-list"></div>
  </div>

  <div id="transactions" class="screen">
    <div class="card">
      <h2>Add Transaction</h2>
      <input id="desc" placeholder="Description">
      <input id="amount" type="number" placeholder="Amount">
      <select id="category">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
        <option value="other">Other</option>
      </select>
      <select id="goal-select"></select>
      <input type="date" id="transaction-date">
      <button id="add-transaction-btn">Add Transaction</button>
    </div>
    <div class="card">
       <input placeholder="Search transactions..." id="search-transactions">
       <ul id="transaction-list"></ul>
    </div>
  </div>

  <div id="settings" class="screen">
    <div class="card">
      <h2>Data Management</h2>
      <button id="export-json-btn">Export Data (JSON)</button>
      <button onclick="localStorage.clear(); location.reload();" style="background:#f44336; margin-top:20px;">Clear All Data</button>
    </div>
  </div>
</div>

<nav>
  <button onclick="switchTab('dashboard')">Dashboard</button>
  <button onclick="switchTab('goals')">Goals</button>
  <button onclick="switchTab('transactions')">Transactions</button>
  <button onclick="switchTab('settings')">Settings</button>
</nav>

<script src="script.js"></script>
</body>
</html>
