<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Budget Pro V9.0</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header><h1>Budget Pro V9.0</h1></header>

<div id="screens">
  <div id="dashboard" class="screen active">
    <div class="card mini-card">
      <small>Safe to Spend</small>
      <h2 id="safe-spend">$0</h2>
      <div class="status-row">
        <small>Bank: <span id="balance">$0</span></small>
        <small>Net Flow: <span id="net-flow">$0</span></small>
      </div>
    </div>
    
    <div class="card">
      <h3>Monthly Pulse</h3>
      <div class="chart-container">
        <div class="chart-column"><div id="bar-income" class="bar income-bar"></div><span>In</span></div>
        <div class="chart-column"><div id="bar-expense" class="bar expense-bar"></div><span>Out</span></div>
      </div>
    </div>

    <div class="card">
      <h3>Budget Caps (Pruning)</h3>
      <div id="category-bars"></div>
    </div>
  </div>

  <div id="transactions" class="screen">
    <div class="card">
      <h3>Add Transaction</h3>
      <input id="desc" placeholder="Merchant (e.g. Walmart)" list="merchant-list">
      <datalist id="merchant-list"></datalist>
      
      <input id="amount" type="number" placeholder="Total Amount ($)">
      
      <div class="split-row">
        <select id="type-select">
          <option value="income">Income</option>
          <option value="expense" selected>Expense</option>
          <option value="invest">Investment</option>
        </select>
        <select id="category-select"></select>
      </div>
      
      <textarea id="note" placeholder="Add a note... (optional)"></textarea>
      <button id="add-transaction-btn">Confirm Log</button>
    </div>
    
    <div class="card">
       <input placeholder="Search notes or merchants..." id="search-transactions">
       <ul id="transaction-list"></ul>
    </div>
  </div>

  <div id="setup" class="screen">
    <div class="card">
      <h3>Custom Categories</h3>
      <div class="split-row">
        <input id="new-cat-name" placeholder="Category Name">
        <button onclick="addCategory()" style="width:70px;">+</button>
      </div>
      <div id="custom-cat-list" class="tag-container"></div>
    </div>
    <div class="card">
      <h3>Monthly Budget Caps</h3>
      <div id="cap-inputs"></div>
    </div>
  </div>
</div>

<nav>
  <button onclick="switchTab('dashboard')">Dash</button>
  <button onclick="switchTab('transactions')">Logs</button>
  <button onclick="switchTab('setup')">Setup</button>
</nav>

<script src="script.js"></script>
</body>
</html>
